name: kora
description: A premium football live scores and streaming app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  dio: ^5.4.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.6
  video_player: ^2.8.2
  chewie: ^1.8.1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^21.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  share_plus: ^10.1.2
  web_socket_channel: ^3.0.1
  sentry_flutter: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#1a1a2e" # Dark blue/purple theme color
  image: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    icon_background_color: "#1a1a2e"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
