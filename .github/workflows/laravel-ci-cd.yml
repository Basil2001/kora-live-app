name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      # If Redis is required for backend tests, we can run a Redis service container
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo-sqlite, bcmath, gd, intl, opcache, redis
        coverage: none

    - name: Install Dependencies
      working-directory: ./backend
      run: |
        composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

    - name: Copy env template for testing
      working-directory: ./backend
      run: cp .env.example .env

    - name: Generate Application Key
      working-directory: ./backend
      run: php artisan key:generate

    - name: Create SQLite Database
      working-directory: ./backend
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Tests
      working-directory: ./backend
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
        REDIS_HOST: 127.0.0.1
      run: php artisan test

  deploy:
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /var/www/kora
          
          # Pull latest code from repo
          echo "📥 Pulling latest code..."
          git pull origin main
          
          # Write production .env file from secrets
          echo "📝 Updating production environment configuration..."
          echo "${{ secrets.ENV_PRODUCTION_FILE }}" > backend/.env
          
          # Rebuild and start production Docker container stack
          echo "🐳 Rebuilding and launching Docker containers..."
          docker compose down
          docker compose up -d --build
          
          # Run DB migrations
          echo "🗄️ Running migrations..."
          docker compose exec -T app php artisan migrate --force
          
          # Rebuild Laravel application caches
          echo "🔄 Caching Laravel routes, config, and views..."
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache
          docker compose exec -T app php artisan event:cache
          docker compose exec -T app php artisan icons:cache
          docker compose exec -T app php artisan filament:cache-components
          
          # Restart queue workers to pick up new code changes
          echo "🔁 Restarting queue workers..."
          docker compose exec -T app php artisan queue:restart
          
          # Link storage folder
          echo "🔗 Linking storage..."
          docker compose exec -T app php artisan storage:link 2>/dev/null || true
          
          echo "✅ Production Deployment Completed Successfully!"
